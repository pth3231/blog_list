name: Self-Hosted Auto-Deploy

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: self-hosted # Tells GitHub to run the script inside your server

    steps:
      - name: Sync Code Changes
        uses: actions/checkout@v4

      - name: Build and Reload App
        run: |
          # The runner handles the pull. Run your local build/restart tasks here:
          npm install
          pm2 restart all
